<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="octopusGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c91e47;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffaa00;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#1a1a2e" stroke="#e94560" stroke-width="3"/>
  
  <!-- Octopus head -->
  <circle cx="100" cy="70" r="35" fill="url(#octopusGradient)"/>
  
  <!-- Octopus eyes -->
  <circle cx="90" cy="60" r="6" fill="white"/>
  <circle cx="110" cy="60" r="6" fill="white"/>
  <circle cx="90" cy="60" r="3" fill="#1a1a2e"/>
  <circle cx="110" cy="60" r="3" fill="#1a1a2e"/>
  
  <!-- Octopus tentacles -->
  <path d="M 75 100 Q 65 120 70 140 Q 75 155 80 160" stroke="url(#octopusGradient)" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M 100 105 Q 100 125 100 150 Q 100 165 100 170" stroke="url(#octopusGradient)" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M 125 100 Q 135 120 130 140 Q 125 155 120 160" stroke="url(#octopusGradient)" stroke-width="8" fill="none" stroke-linecap="round"/>
  
  <!-- Dumbbell overlay (fitness symbol) -->
  <rect x="50" y="140" width="100" height="12" rx="6" fill="url(#accentGradient)" opacity="0.8"/>
  <circle cx="55" cy="146" r="10" fill="url(#accentGradient)"/>
  <circle cx="145" cy="146" r="10" fill="url(#accentGradient)"/>
  
  <!-- Smile -->
  <path d="M 90 85 Q 100 92 110 85" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>